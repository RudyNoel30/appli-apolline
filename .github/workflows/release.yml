name: Build & Release MSI

# Déclencheur : push d'un tag de version (ex: v0.1.71)
#   git tag v0.1.71
#   git push origin v0.1.71
#
# Workflow :
#   1. Build du MSI signé (clé Tauri stockée dans les secrets)
#   2. Upload comme asset sur la GitHub Release du tag
#   3. Upload sur le VPS Hostinger (/opt/apolline-releases/)
#   4. Génération + upload de latest.json (pour l'updater Tauri)
#
# Au final : les utilisateurs Apolline reçoivent l'update automatiquement
# au démarrage suivant de l'app, sans intervention manuelle de ta part.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version à builder (ex: 0.1.71)'
        required: true
        type: string

permissions:
  contents: write

env:
  # Force le target-dir Cargo dans le repo (override de .cargo/config.toml local)
  CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Sync version in package.json + tauri.conf.json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $pkg = Get-Content package.json -Raw
          $pkg = $pkg -replace '("version"\s*:\s*")[^"]+(")', ('${1}' + $version + '${2}')
          [System.IO.File]::WriteAllText("$PWD\package.json", $pkg, [System.Text.UTF8Encoding]::new($false))

          $conf = Get-Content src-tauri/tauri.conf.json -Raw
          $conf = $conf -replace '("version"\s*:\s*")[^"]+(")', ('${1}' + $version + '${2}')
          [System.IO.File]::WriteAllText("$PWD\src-tauri\tauri.conf.json", $conf, [System.Text.UTF8Encoding]::new($false))

          Write-Host "Versions sync'd to $version"

      - name: Build & sign Tauri MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Locate MSI artifact
        id: artifact
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bundleDir = "src-tauri\target\release\bundle\msi"
          $msi = Get-ChildItem -Path $bundleDir -Filter "Extrapol_${version}_x64_*.msi" | Select-Object -First 1
          $sig = Get-ChildItem -Path $bundleDir -Filter "Extrapol_${version}_x64_*.msi.sig" | Select-Object -First 1
          if (-not $msi -or -not $sig) {
            Write-Error "MSI ou .sig introuvable. Contenu du dossier:"
            Get-ChildItem -Path $bundleDir
            exit 1
          }
          echo "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          echo "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT
          echo "sig_path=$($sig.FullName)" >> $env:GITHUB_OUTPUT
          echo "sig_name=$($sig.Name)" >> $env:GITHUB_OUTPUT
          $sigContent = Get-Content $sig.FullName -Raw
          $sigContent = $sigContent.Trim()
          # Encode multi-ligne pour GITHUB_OUTPUT
          $delimiter = "EOF_$(Get-Random)"
          echo "sig_content<<$delimiter" >> $env:GITHUB_OUTPUT
          echo $sigContent >> $env:GITHUB_OUTPUT
          echo $delimiter >> $env:GITHUB_OUTPUT
          Write-Host "MSI: $($msi.Name) ($([math]::Round($msi.Length / 1MB, 1)) MB)"

      - name: Generate latest.json (pointe directement vers GitHub Release)
        shell: pwsh
        run: |
          # URL des assets : GitHub Release de ce tag. Plus aucun passage par
          # le VPS pour le MSI → zéro dépendance SSH.
          # Caddy sur le VPS gère uniquement le /latest.json via 302 redirect
          # (cf. doc/Caddyfile-updater).
          $version = "${{ steps.version.outputs.version }}"
          $sig = "${{ steps.artifact.outputs.sig_content }}".Trim()
          $msiName = "${{ steps.artifact.outputs.msi_name }}"
          $pubDate = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ss') + 'Z'

          $repo = "${{ github.repository }}"  # ex: RudyNoel30/appli-apolline
          $githubUrl = "https://github.com/$repo/releases/download/v$version/$msiName"

          $manifest = @{
            version   = $version
            notes     = "Release v$version"
            pub_date  = $pubDate
            platforms = @{
              'windows-x86_64' = @{
                signature = $sig
                url       = $githubUrl
              }
            }
          }
          $json = $manifest | ConvertTo-Json -Depth 10
          [System.IO.File]::WriteAllText("$PWD\latest.json", $json, [System.Text.UTF8Encoding]::new($false))
          Write-Host "latest.json:"
          Get-Content latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # latest.json est uploadé en tant qu'asset → accessible via
          # https://github.com/$repo/releases/latest/download/latest.json
          # (URL stable, GitHub redirige toujours vers la dernière release).
          files: |
            ${{ steps.artifact.outputs.msi_path }}
            ${{ steps.artifact.outputs.sig_path }}
            latest.json
          generate_release_notes: true
          draft: false
          prerelease: false

      # ───────────────────────────────────────────────────────────────────
      # Plus aucun step SSH/scp ici. Caddy sur le VPS sert juste de
      # redirecteur (return 302) pour /latest.json — voir doc/Caddyfile-updater.
      # Les MSI sont téléchargés directement depuis GitHub par le client Tauri.
      # ───────────────────────────────────────────────────────────────────

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet package.json src-tauri/tauri.conf.json; then
            echo "No version bump needed"
          else
            git add package.json src-tauri/tauri.conf.json
            git commit -m "chore: release v${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Summary
        shell: bash
        run: |
          echo "### ✅ Frontend MSI v${{ steps.version.outputs.version }} publié" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **MSI** : \`${{ steps.artifact.outputs.msi_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Release** : [voir](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "- **MSI direct (GitHub)** : https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/${{ steps.artifact.outputs.msi_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Updater URL** : https://updates.apolline.groupe-apolline.eu/latest.json (302 → GitHub via nginx)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture** : plus aucun scp côté Windows runner. Le MSI est servi direct depuis GitHub Releases, et nginx sur le VPS redirige uniquement \`/latest.json\` vers GitHub (immune au fail2ban)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Le déploiement backend tourne en parallèle (job deploy-backend)." >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────────
  # JOB 2 — Déploiement du backend (Hono + Drizzle) sur le VPS
  # ────────────────────────────────────────────────────────────────────
  # Tourne sur un SELF-HOSTED runner installé directement sur le VPS.
  # Pas de SSH/scp depuis l'extérieur — le runner est local, donc tout est
  # exécuté en place sur /opt/apolline-backend.
  #
  # Le runner s'exécute en tant qu'utilisateur `runner` (non-root) avec des
  # sudoers règles strictement scopées sur :
  #   - /bin/systemctl {restart,is-active,status} apolline-api
  #   - /usr/bin/psql en tant que postgres
  # (cf. /etc/sudoers.d/runner-apolline)

  deploy-backend:
    runs-on: [self-hosted, Linux, apolline-vps]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync backend code into /opt/apolline-backend
        run: |
          # Sync ciblé : src + migrations + manifests + tsconfig.
          # On NE supprime PAS de fichiers (-a sans --delete) pour ne pas
          # effacer ce qui est légitimement présent (.env, dist/, …).
          # Le runner est local sur le VPS → rsync local, pas de transport ssh.
          rsync -av --no-perms --no-owner --no-group \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='.env*' \
            apolline-backend/src/ \
            /opt/apolline-backend/src/

          rsync -av --no-perms --no-owner --no-group \
            apolline-backend/drizzle/ \
            /opt/apolline-backend/drizzle/

          # Manifests + config TS (à plat)
          cp apolline-backend/package.json \
             apolline-backend/package-lock.json \
             apolline-backend/tsconfig.json \
             /opt/apolline-backend/

      - name: Install npm deps
        working-directory: /opt/apolline-backend
        run: npm ci --no-audit --no-fund

      - name: Apply SQL migrations (idempotent)
        working-directory: /opt/apolline-backend
        run: |
          for f in drizzle/*.sql; do
            echo "  → $f"
            # Migrations utilisent IF NOT EXISTS donc idempotentes.
            # sudo -u postgres autorisé via /etc/sudoers.d/runner-apolline
            sudo -u postgres psql -d apolline -f "$f" >/dev/null
          done

      - name: Build TypeScript
        working-directory: /opt/apolline-backend
        run: npm run build

      - name: Restart apolline-api service
        run: |
          sudo systemctl restart apolline-api
          sleep 2
          sudo systemctl is-active apolline-api

      - name: Healthcheck
        run: |
          curl -fsS http://127.0.0.1:3000/healthz | head -100 || (echo "⚠️ Healthcheck KO" && exit 1)

      - name: Summary
        run: |
          echo "### ✅ Backend déployé (self-hosted runner)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Source synchronisée (\`src/\` + \`drizzle/\` + manifests)" >> $GITHUB_STEP_SUMMARY
          echo "- Migrations SQL appliquées (idempotentes)" >> $GITHUB_STEP_SUMMARY
          echo "- \`npm ci\` + \`npm run build\` + \`systemctl restart apolline-api\`" >> $GITHUB_STEP_SUMMARY
          echo "- Healthcheck OK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tourne sur self-hosted runner \`apolline-vps\` — plus aucun SSH externe." >> $GITHUB_STEP_SUMMARY
