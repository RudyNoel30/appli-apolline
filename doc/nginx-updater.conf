# ═══════════════════════════════════════════════════════════════════════════
# Config nginx pour updates.apolline.groupe-apolline.eu
# ═══════════════════════════════════════════════════════════════════════════
#
# Architecture : depuis v0.1.94, le workflow CI ne fait PLUS de scp vers le
# VPS pour les MSI. Le client Tauri télécharge directement les MSI depuis
# GitHub Releases (URL stockée dans latest.json).
#
# Le rôle du VPS se limite à servir une REDIRECTION pour /latest.json afin
# de préserver l'URL historique configurée dans tauri.conf.json côté client.
#
# À installer dans /etc/nginx/sites-available/apolline-updater puis :
#   ln -sf /etc/nginx/sites-available/apolline-updater /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# ───────────────────────────────────────────────────────────────────────────
# OWNER/REPO GitHub à adapter si jamais ça change :
# ───────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name updates.apolline.groupe-apolline.eu;

    # ─── TLS (Let's Encrypt via certbot) ───────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/updates.apolline.groupe-apolline.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/updates.apolline.groupe-apolline.eu/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── /latest.json → manifeste de la dernière release sur GitHub ────────
    # GitHub offre une URL "stable" qui redirige toujours vers la dernière
    # release publiée : https://github.com/OWNER/REPO/releases/latest/download/<file>
    # On fait juste un 302 vers cette URL et le client Tauri suit le redirect.
    location = /latest.json {
        return 302 https://github.com/RudyNoel30/appli-apolline/releases/latest/download/latest.json;
    }

    # ─── (Optionnel) /Extrapol_*.msi → release versionnée sur GitHub ───────
    # Garde une compat ascendante au cas où des vieux installs auraient un
    # latest.json en cache avec l'ancienne URL VPS. Extrait la version du
    # filename et redirige vers la release correspondante.
    location ~ ^/Extrapol_([0-9.]+)_(.+)$ {
        return 302 https://github.com/RudyNoel30/appli-apolline/releases/download/v$1/Extrapol_$1_$2;
    }

    # ─── Healthcheck simple ────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── Tout le reste → 404 (rien d'autre n'est servi ici) ────────────────
    location / {
        return 404 "Not found. See /latest.json for the Tauri updater manifest.\n";
        add_header Content-Type text/plain;
    }
}

# ─── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name updates.apolline.groupe-apolline.eu;
    return 301 https://$host$request_uri;
}
