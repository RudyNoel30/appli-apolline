# Configuration nginx pour Apolline Backend
# Placer dans /etc/nginx/sites-available/apolline-api puis :
#   sudo ln -s /etc/nginx/sites-available/apolline-api /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.apolline.groupe-apolline.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.apolline.groupe-apolline.com;

    # Let's Encrypt (certbot l'ajoutera automatiquement)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Tout le reste → HTTPS (certbot ajoute le bloc 301 auto)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.apolline.groupe-apolline.com;

    # SSL — certbot configure ces lignes après `certbot --nginx`
    # ssl_certificate /etc/letsencrypt/live/api.apolline.groupe-apolline.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.apolline.groupe-apolline.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip + body size
    gzip on;
    gzip_types application/json text/plain;
    client_max_body_size 25M;

    # Logs
    access_log /var/log/nginx/apolline-api-access.log;
    error_log /var/log/nginx/apolline-api-error.log;

    # Reverse proxy vers Hono
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE — IMPORTANT : désactive le buffering nginx pour l'endpoint /api/events
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # Timeouts longs pour SSE (sinon nginx coupe au bout de 60s)
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }
}
